<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BASKETMASTER AVABRA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; margin: 0; padding: 10px; text-align: center; }
        h1 { color: #ff6b00; margin-bottom: 10px; font-size: 22px; }
        
        .teams { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .team { width: 45%; padding: 10px; border-radius: 10px; min-height: 200px; }
        .white-team { background-color: #ffffff; color: black; }
        .blue-team { background-color: #0047ab; color: white; }
        
        .player { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; font-weight: bold; font-size: 14px; }
        .foul-btn { background-color: #ff4444; color: white; border: none; padding: 6px 10px; border-radius: 5px; font-weight: bold; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { width: 80%; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; }
        .add-btn { background-color: #4caf50; color: white; }
        .win-btn { background-color: #ff6b00; color: white; }
        .reset-btn { background-color: #555; color: white; width: 50%; font-size: 10px; }
        
        .queue { margin-top: 20px; text-align: left; background: #222; padding: 10px; border-radius: 10px; }
        .queue-title { color: #ff6b00; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <h1>AVABRA MASTER 50</h1>

    <div class="teams">
        <div class="team white-team">
            <h3>BRANCO</h3>
            <div id="white-list"></div>
        </div>
        <div class="team blue-team">
            <h3>AZUL</h3>
            <div id="blue-list"></div>
        </div>
    </div>

    <div class="controls">
        <button class="add-btn" onclick="addPlayer()">+ ADICIONAR ATLETA</button>
        <button class="win-btn" onclick="winGame()">VITÓRIA / PRÓXIMO</button>
        <button class="reset-btn" onclick="resetSystem()">ZERAR SISTEMA</button>
    </div>

    <div class="queue">
        <span class="queue-title">PRÓXIMOS DA FILA:</span>
        <div id="queue-list"></div>
    </div>

    <script>
        const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
        const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let state = { white: [], blue: [], queue: [], fouls: {} };

        async function loadData() {
            const { data } = await supabaseClient.from('racha_session').select('data').eq('id', 1).single();
            if (data) { state = data.data; render(); }
            migrarDadosAntigos();
        }

        async function migrarDadosAntigos() {
            const salvoAntigo = localStorage.getItem('racha_avabra_data');
            if (salvoAntigo) {
                const dados = JSON.parse(salvoAntigo);
                if (state.white.length === 0 && dados.white.length > 0) {
                    if (confirm("Recuperar nomes da versão offline?")) {
                        state = dados;
                        sync();
                        localStorage.removeItem('racha_avabra_data');
                    }
                }
            }
        }

        async function sync() {
            await supabaseClient.from('racha_session').update({ data: state }).eq('id', 1);
            render();
        }

        function addPlayer() {
            const name = prompt("NOME DO ATLETA:").toUpperCase();
            if (!name) return;
            state.fouls[name] = 0;
            if (state.white.length < 5) state.white.push(name);
            else if (state.blue.length < 5) state.blue.push(name);
            else state.queue.push(name);
            sync();
        }

        function addFoul(name) {
            state.fouls[name] = (state.fouls[name] || 0) + 1;
            if (state.fouls[name] >= 4) alert("🚨 " + name + " ESTOUROU (4 FALTAS)!");
            sync();
        }

        function winGame() {
            const winner = prompt("QUEM VENCEU? (B ou A)").toUpperCase();
            if (winner === 'B') rotate(state.blue);
            else if (winner === 'A') rotate(state.white);
        }

        function rotate(losingTeam) {
            state.queue.push(...losingTeam);
            losingTeam.length = 0;
            while (losingTeam.length < 5 && state.queue.length > 0) {
                losingTeam.push(state.queue.shift());
            }
            Object.keys(state.fouls).forEach(p => state.fouls[p] = 0);
            sync();
        }

        function resetSystem() {
            if (confirm("DESEJA ZERAR TUDO?")) {
                state = { white: [], blue: [], queue: [], fouls: {} };
                sync();
            }
        }

        function render() {
            const createList = (list, elementId) => {
                const el = document.getElementById(elementId);
                el.innerHTML = list.map(p => `
                    <div class="player">
                        <span>${p}</span>
                        <div>
                            <span>${state.fouls[p] || 0}F</span>
                            <button class="foul-btn" onclick="addFoul('${p}')">F</button>
                        </div>
                    </div>
                `).join('');
            };
            createList(state.white, 'white-list');
            createList(state.blue, 'blue-list');
            document.getElementById('queue-list').innerText = state.queue.join(', ');
        }

        supabaseClient.channel('any').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'racha_session' }, payload => {
            state = payload.new.data;
            render();
        }).subscribe();

        loadData();
    </script>
</body>
</html>
