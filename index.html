<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVABRA MASTER V21.24 - REGRA SUSPENSÃO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff6b00; --blue: #2962ff; --dark: #000; --yellow: #ffd600; --red: #ff4444; --green: #25d366; }
        body { font-family: Arial, sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; user-select: none; }
        .header { display: flex; justify-content: center; align-items: center; padding: 15px; background: #000; border-bottom: 1px solid #222; }
        .logo { color: var(--orange); font-weight: bold; font-style: italic; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .placar-live { display: flex; justify-content: center; align-items: center; gap: 20px; background: #111; padding: 15px; border-bottom: 2px solid #222; }
        .placar-box { text-align: center; min-width: 80px; }
        .placar-numero { font-size: 32px; font-weight: bold; font-family: monospace; padding: 5px 15px; border-radius: 8px; border: 2px solid #333; }
        .placar-numero.br { background: #fff; color: #000; }
        .placar-numero.az { background: var(--blue); color: #fff; }
        .placar-label { font-size: 10px; font-weight: bold; margin-top: 5px; color: #666; text-transform: uppercase; }
        .game-clock-area { background: #000; padding: 10px; text-align: center; border-bottom: 2px solid #222; position: relative; }
        #game-clock { font-family: 'Courier New', monospace; font-size: 52px; font-weight: bold; color: var(--yellow); letter-spacing: 2px; }
        .area-start-match { padding: 15px; display: flex; justify-content: center; background: #111; }
        .btn-big-start { width: 100%; background: var(--green); color: #000; padding: 22px; border: none; border-radius: 8px; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .clock-controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-clock { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        .btn-pause { background: var(--orange); color: #fff; }
        .btn-resume { background: var(--green); color: #000; }
        .btn-reset { background: #333; color: #888; border: 1px solid #444; }
        .timer-area { display: flex; gap: 5px; padding: 10px; background: #111; justify-content: center; }
        .btn-t { flex: 1; padding: 14px 5px; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; cursor: pointer; text-transform: uppercase; line-height: 1.2; }
        .t-br { background: #ffffff; color: #000; } .t-az { background: var(--blue); color: #fff; } .t-em { background: #555; color: #fff; }
        .vitoria-btns { display: flex; gap: 5px; padding: 10px 10px 0 10px; }
        .btn-v { flex: 1; padding: 15px; border: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        .btn-white { background: #fff; color: #000; } .btn-blue { background: var(--blue); color: #fff; }
        .faixa { background: #111; color: #888; padding: 6px 15px; font-size: 10px; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #222; }
        .linha { display: flex; flex-direction: column; padding: 10px; border-bottom: 1px solid #eee; background: #fff; color: #000; }
        .linha.azul { background: var(--blue); color: #fff; }
        .top-row { display: flex; align-items: center; }
        .info { flex: 1; } .nome { font-weight: bold; font-size: 14px; }
        .stats-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
        .acoes { display: flex; gap: 4px; }
        .f-box { background: #8b0000; color: #fff; padding: 10px 14px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-p { width: 42px; height: 44px; border: none; border-radius: 4px; font-weight: bold; background: #222; color: #fff; font-size: 16px; cursor: pointer; }
        .btn-corrige { font-size: 11px; color: #d32f2f; background: #fff; border: 2px solid #d32f2f; padding: 4px 6px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-right: 4px; }
        .bottom-row { display: flex; gap: 5px; margin-top: 8px; }
        .btn-excluir { flex: 1; font-size: 9px; padding: 8px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-lesao { background: #555; color: #fff; } .btn-falta3 { background: var(--red); color: #fff; }
        #q-list { padding: 15px; background: #0a0a0a; font-size: 13px; font-weight: bold; line-height: 2.2; }
        .espera-item { display: inline-block; margin-right: 15px; border-bottom: 1px solid #222; }
        .espera-amarela { color: var(--yellow); } .espera-verde { color: var(--green); }
        .rodape { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #333; padding: 12px 0; z-index: 100; }
        .nav-b { flex: 1; color: #fff; font-size: 11px; font-weight: bold; text-align: center; text-transform: uppercase; cursor: pointer; }
        .nav-b.active { color: var(--orange); }
        .lista-disp, .item-cadastro { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #1a1a1a; border-bottom: 1px solid #222; }
        .btn-entrar { background: var(--green); color: #000; padding: 8px 12px; border:none; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .sumula-card { background: #1a1a1a; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
        .sumula-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 8px; }
        .sumula-placar { font-family: monospace; font-size: 20px; font-weight: bold; color: var(--yellow); }
        .player-line { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 5px 0; font-size: 9px; line-height: 1.2; }
    </style>
</head>
<body>
    <div id="view-racha">
        <div class="header"><div class="logo">AVABRA V21.24 - MASTER</div></div>
        <div class="placar-live">
            <div class="placar-box"><div id="score-br" class="placar-numero br">0</div><div class="placar-label">Branco</div></div>
            <div style="font-size: 24px; font-weight: bold; color: #333;">X</div>
            <div class="placar-box"><div id="score-az" class="placar-numero az">0</div><div class="placar-label">Azul</div></div>
        </div>
        <div class="game-clock-area">
            <div id="game-clock">10:00</div>
            <div id="init-action-area" class="area-start-match">
                <button class="btn-big-start" onclick="iniciarTudo()">🏀 INICIAR A PARTIDA</button>
            </div>
            <div id="clock-controls-area" class="clock-controls" style="display:none;">
                <button id="btn-toggle-clock" class="btn-clock" onclick="toggleClock()">⏸️ Pausar</button>
                <button class="btn-clock btn-reset" onclick="resetClock()">🔄 Zerar</button>
            </div>
        </div>
        <div class="timer-area">
            <button class="btn-t t-br" onclick="terminoTempo('B')">Tempo Branco</button>
            <button class="btn-t t-az" onclick="terminoTempo('A')">Tempo Azul</button>
            <button class="btn-t t-em" onclick="terminoTempo('E')">Tempo Empate</button>
        </div>
        <div class="vitoria-btns">
            <button class="btn-v btn-white" onclick="vitoriaPlacar('B')">VITÓRIA BRANCO</button>
            <button class="btn-v btn-blue" onclick="vitoriaPlacar('A')">VITÓRIA AZUL</button>
        </div>
        <div class="faixa">Time Branco</div><div id="w-list"></div>
        <div class="faixa">Time Azul</div><div id="a-list"></div>
        <div class="faixa">Lista de Espera</div><div id="q-list"></div>
        <div class="faixa">No Ginásio</div><div id="disp-list"></div>
    </div>
    <div id="view-stats" style="display:none; padding:15px;"><div id="lista-estatisticas-geral"></div><hr><div id="lista-historico-partidas"></div></div>
    <div id="view-atletas" style="display:none; padding:20px;"><button style="background:var(--orange); color:white; padding:15px; border:none; width:100%; border-radius:8px; font-weight:bold;" onclick="cadastrarNovo()">+ CADASTRAR NOVO</button><div id="lista-cadastrados"></div><button style="background:var(--red); color:#fff; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; margin-top:10px;" onclick="resetarRacha()">⚠️ ZERAR TODO O RACHA</button></div>
    <div style="height:120px"></div>
    <div class="rodape"><div id="nav-racha" class="nav-b active" onclick="mudarAba('racha')">Racha</div><div id="nav-stats" class="nav-b" onclick="mudarAba('stats')">Estatísticas</div><div id="nav-atletas" class="nav-b" onclick="mudarAba('atletas')">Cadastro</div></div>

<script>
    const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
    const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let d = { white: [], blue: [], queue: [], all: [], points: {}, fouls: {}, hist_pts: {}, hist_fls: {}, hist_time: {}, history_matches: [], players_log: [], players_entry_time: {}, remaining_seconds: 600, clock_running: false, is_recording: false, scoreW: 0, scoreA: 0, streakW: 0, streakA: 0, suspended: [] };
    let abaAtiva = 'racha';

    async function load() {
        try {
            const { data } = await sb.from('racha_session').select('data').eq('id', 1).maybeSingle();
            if (data && data.data) {
                const localClock = d.clock_running; const localRem = d.remaining_seconds;
                const localIsRec = d.is_recording;
                d = data.data;
                d.clock_running = localClock; d.remaining_seconds = localRem; d.is_recording = localIsRec;
            }
            render();
        } catch (e) {}
    }
    setInterval(() => { if (abaAtiva !== 'atletas') load(); }, 10000);
    async function sync() { render(); await sb.from('racha_session').update({ data: d }).eq('id', 1); }

    function formatTimeDisplay(s) { const v = Math.max(0, Math.floor(s)); return `${Math.floor(v/60).toString().padStart(2,'0')}:${(v%60).toString().padStart(2,'0')}`; }
    function iniciarTudo() { d.is_recording = true; d.clock_running = true; d.remaining_seconds = 600; const now = Date.now(); [...d.white, ...d.blue].forEach(p => { logarEvento(p, d.white.includes(p)?'W':'A', "INICIO"); d.players_entry_time[p] = now; }); sync(); }
    function toggleClock() { const now = Date.now(); if (!d.clock_running) { d.clock_running = true; [...d.white, ...d.blue].forEach(p => { d.players_entry_time[p] = now; }); } else { calcularTempoAtletas(); d.clock_running = false; } render(); }
    function resetClock() { if(confirm("Zerar cronômetro e placar?")) { d.clock_running = false; d.remaining_seconds = 600; d.scoreW = 0; d.scoreA = 0; d.is_recording = false; sync(); } }

    setInterval(() => { if (d.clock_running && d.remaining_seconds > 0) { d.remaining_seconds -= 1; document.getElementById('game-clock').innerText = formatTimeDisplay(d.remaining_seconds); if (d.remaining_seconds <= 0) { d.clock_running = false; render(); } } }, 1000);

    function calcularTempoAtletas() { const now = Date.now(); [...d.white, ...d.blue].forEach(p => { if (d.players_entry_time[p]) { d.hist_time[p] = (d.hist_time[p] || 0) + ((now - d.players_entry_time[p]) / 1000); delete d.players_entry_time[p]; } }); }
    function logarEvento(n, t, s) { if(!d.players_log) d.players_log = []; let p = d.players_log.find(x => x.n === n); if(!p) { d.players_log.push({ n: n, t: t, s: s, p_ini: d.points[n]||0, f_ini: d.fouls[n]||0, t_ini: d.hist_time[n]||0 }); } else { p.s = s; } }
    
    function gravarSumulaFinal() {
        calcularTempoAtletas(); if(!d.history_matches) d.history_matches = [];
        const proc = (tK) => (d.players_log || []).filter(x => x.t === tK).map(x => ({ n: x.n, p: (d.points[x.n]||0) - (x.p_ini||0), f: (d.fouls[x.n]||0) - (x.f_ini||0), t: (d.hist_time[x.n]||0) - (x.t_ini||0), s: x.s }));
        d.history_matches.push({ id: d.history_matches.length + 1, data: new Date().toLocaleTimeString('pt-BR'), placar: `${d.scoreW} x ${d.scoreA}`, branco: proc('W'), azul: proc('A') });
        d.players_log = []; d.players_entry_time = {};
    }

    window.vitoriaPlacar = (v) => {
        if(!confirm("Confirmar vitória?")) return;
        gravarSumulaFinal(); d.is_recording = false; d.clock_running = false;
        
        const winners = v === 'B' ? 'white' : 'blue';
        const losers = v === 'B' ? 'blue' : 'white';
        
        // TRATAMENTO DOS SUSPENSOS
        // Se o time perdeu, o suspenso vai pro fim. Se ganhou, ele volta pro time.
        if (d.suspended.length > 0) {
            d.suspended.forEach(p => {
                if (p.team === losers) { d.queue.push(p.name); } // Perdeu, vai pro fim
                else { d[winners].push(p.name); } // Ganhou, volta pro time
            });
            d.suspended = [];
        }

        if(v==='B'){
            d.streakW = (d.streakW||0)+1; d.streakA = 0;
            if(d.streakW >= 2){ d.queue.push(...d.white, ...d.blue); d.white=[]; d.blue=[]; d.streakW=0; } 
            else { d.queue.push(...d.blue); d.blue=[]; }
        } else {
            d.streakA = (d.streakA||0)+1; d.streakW = 0;
            if(d.streakA >= 2){ d.queue.push(...d.blue, ...d.white); d.white=[]; d.blue=[]; d.streakA=0; } 
            else { d.queue.push(...d.white); d.white=[]; }
        }
        d.scoreW=0; d.scoreA=0; rodar();
    };

    window.terminoTempo = (v) => {
        if(!confirm("Encerrar partida?")) return;
        gravarSumulaFinal(); d.is_recording = false; d.clock_running = false;
        
        // No tempo, todos os suspensos vão para a fila conforme a ordem de vitória/empate
        const winners = v === 'B' ? 'white' : 'blue';
        const losers = v === 'B' ? 'blue' : 'white';
        
        if (v === 'E') {
            const emQ = [...d.white, ...d.blue, ...d.suspended.map(s => s.name)];
            const original = d.all.filter(p => emQ.includes(p));
            d.queue.push(...original);
        } else {
            // Vencedor na frente do perdedor (incluindo suspensos de cada lado)
            const pVenc = [...d[winners], ...d.suspended.filter(s => s.team === winners).map(s => s.name)];
            const pPerd = [...d[losers], ...d.suspended.filter(s => s.team === losers).map(s => s.name)];
            d.queue.push(...pVenc, ...pPerd);
        }
        
        d.suspended = []; d.white=[]; d.blue=[]; d.scoreW=0; d.scoreA=0; d.streakW=0; d.streakA=0; rodar();
    };

    function rodar() { while(d.white.length<5 && d.queue.length>0) d.white.push(d.queue.shift()); while(d.blue.length<5 && d.queue.length>0) d.blue.push(d.queue.shift()); [...d.white, ...d.blue].forEach(p=>{d.points[p]=0; d.fouls[p]=0;}); sync(); }
    window.addPt = (n, p) => { d.points[n] = (d.points[n]||0)+p; d.hist_pts[n] = (d.hist_pts[n]||0)+p; if(d.white.includes(n)) d.scoreW += p; else d.scoreA += p; sync(); };
    window.subPt = (n) => { if ((d.points[n]||0) > 0) { d.points[n]--; d.hist_pts[n]--; if (d.white.includes(n)) d.scoreW--; else d.scoreA--; } sync(); };
    window.addFl = (n) => { d.fouls[n] = (d.fouls[n]||0)+1; d.hist_fls[n] = (d.hist_fls[n]||0)+1; sync(); };
    window.subFl = (n) => { if ((d.fouls[n]||0) > 0) { d.fouls[n]--; d.hist_fls[n]--; } sync(); };
    
    window.removerAtleta = (nome, local, motivo) => {
        if(!confirm("Confirmar remoção?")) return;
        calcularTempoAtletas();
        if (motivo === 'sub') {
            logarEvento(nome, local==='white'?'W':'A', "SUBS");
            d[local] = d[local].filter(p => p !== nome);
            if (d.queue.length > 0) {
                const sub = (d.scoreW===0 && d.scoreA===0) ? d.queue.shift() : d.queue.pop();
                d.points[sub]=0; d.fouls[sub]=0; d[local].push(sub);
                logarEvento(sub, local==='white'?'W':'A', "ENTROU");
                if(d.clock_running) d.players_entry_time[sub] = Date.now();
            }
        } else if (motivo === 'falta') {
            logarEvento(nome, local==='white'?'W':'A', "SUSPENSO");
            d[local] = d[local].filter(p => p !== nome);
            if(!d.suspended) d.suspended = [];
            d.suspended.push({ name: nome, team: local });
            d.queue.unshift(nome); // Vai pro início da fila (posição 1)
        }
        sync();
    };

    window.cadastrarNovo = () => { const n = prompt("NOME:"); if (n) { d.all.push(n.toUpperCase().trim()); sync(); } };
    window.entrarNoJogo = (n) => { if (d.white.length < 5) d.white.push(n); else if (d.blue.length < 5) d.blue.push(n); else d.queue.push(n); sync(); };
    window.mudarAba = (aba) => { abaAtiva = aba; document.querySelectorAll('[id^="view-"]').forEach(v => v.style.display = 'none'); document.getElementById(`view-${aba}`).style.display = 'block'; document.querySelectorAll('.nav-b').forEach(el => el.classList.remove('active')); document.getElementById(`nav-${aba}`).classList.add('active'); };
    window.resetarRacha = () => { if(confirm("ZERAR TUDO?")) { d = { white: [], blue: [], queue: [], all: d.all, points: {}, fouls: {}, hist_pts: {}, hist_fls: {}, hist_time: {}, history_matches: [], players_log: [], scoreW: 0, scoreA: 0, streakW: 0, streakA: 0, remaining_seconds: 600, clock_running: false, is_recording: false, suspended: [] }; sync(); } };

    function render() {
        document.getElementById('score-br').innerText = d.scoreW || 0; document.getElementById('score-az').innerText = d.scoreA || 0;
        document.getElementById('game-clock').innerText = formatTimeDisplay(d.remaining_seconds);
        const areaStart = document.getElementById('init-action-area'); const areaClock = document.getElementById('clock-controls-area');
        if (d.is_recording) { areaStart.style.display = 'none'; areaClock.style.display = 'flex'; } else { areaStart.style.display = 'flex'; areaClock.style.display = 'none'; }
        const bT = document.getElementById('btn-toggle-clock'); if(bT) { bT.innerHTML = d.clock_running ? "⏸️ Pausar" : "▶️ Retomar"; bT.className = d.clock_running ? "btn-clock btn-pause" : "btn-clock btn-resume"; }
        const draw = (list, id, az, slug) => { document.getElementById(id).innerHTML = list.map(p => `<div class="linha ${az?'azul':''}">
            <div class="top-row"><div class="info"><span class="nome">${p}</span><div class="stats-row"><span>P: ${d.points[p]||0} | F: ${d.fouls[p]||0}</span><button class="btn-corrige" onclick="subPt('${p}')">P-</button><button class="btn-corrige" onclick="subFl('${p}')">F-</button></div></div>
            <div class="acoes"><div class="f-box" onclick="addFl('${p}')">F+</div><div><button class="btn-p" onclick="addPt('${p}',1)">1</button><button class="btn-p" onclick="addPt('${p}',2)">2</button><button class="btn-p laranja" onclick="addPt('${p}',3)">3</button></div></div></div>
            <div class="bottom-row"><button class="btn-excluir btn-lesao" onclick="removerAtleta('${p}','${slug}','sub')">Sair</button><button class="btn-excluir btn-falta3" onclick="removerAtleta('${p}','${slug}','falta')">Faltas</button></div></div>`).join(''); };
        draw(d.white, 'w-list', false, 'white'); draw(d.blue, 'a-list', true, 'blue');
        document.getElementById('q-list').innerHTML = d.queue.map((p, i) => {
            const isSusp = d.suspended && d.suspended.find(s => s.name === p);
            return `<span class="espera-item ${(Math.floor(i / 5) % 2 === 0)?'espera-amarela':'espera-verde'}">${i+1}.${p}${isSusp?' [S]':''}</span>`;
        }).join(' ');
        document.getElementById('disp-list').innerHTML = d.all.filter(p => ![...d.white, ...d.blue, ...d.queue].includes(p)).sort().map(p => `<div class="lista-disp"><span>${p}</span><button class="btn-entrar" onclick="entrarNoJogo('${p}')">CHEGOU</button></div>`).join('');
        document.getElementById('lista-cadastrados').innerHTML = d.all.sort().map(p => `<div class="item-cadastro"><span>${p}</span><button style="color:red;background:none;border:none;" onclick="if(confirm('Excluir?')){d.all=d.all.filter(x=>x!==p);sync()}">EXCLUIR</button></div>`).join('');
        let hS = ""; d.all.sort().forEach(p => { const pts = (d.hist_pts[p]||0); const tS = formatTimeDisplay(d.hist_time[p]||0); if(pts > 0 || (d.hist_time[p]||0) > 0) hS += `<div style="background:#1a1a1a;padding:10px;margin-bottom:5px;border-radius:4px;display:flex;justify-content:space-between;"><span>${p}</span><span>${pts} PTS | ${tS}</span></div>`; });
        document.getElementById('lista-estatisticas-geral').innerHTML = hS || "Vazio.";
        let hH = ""; [...(d.history_matches || [])].reverse().forEach((j) => {
            const rt = (tm) => (tm||[]).map(p => { const icon = p.s === "SUBS" ? "🔻" : p.s === "ENTROU" ? "🔺" : p.s === "SUSPENSO" ? "<b style='color:red'>[S]</b>" : ""; const color = p.s === "SUSPENSO" ? "color:red;font-weight:bold;" : ""; return `<div class="player-line" style="${color}"><span>${p.n} ${icon}</span><span>${p.p}P/${p.f}F/${formatTimeDisplay(p.t)}</span></div>`; }).join('');
            hH += `<div class="sumula-card"><div class="sumula-header"><div><span style="font-weight:bold; color:var(--orange)">JOGO ${j.id}</span></div><div class="sumula-placar">${j.placar}</div></div><div class="sumula-teams"><div class="team-box"><b>BR</b><br>${rt(j.branco)}</div><div class="team-box"><b>AZ</b><br>${rt(j.azul)}</div></div></div>`;
        });
        document.getElementById('lista-historico-partidas').innerHTML = hH || "Vazio.";
    }
    load();
</script>
</body>
</html>
