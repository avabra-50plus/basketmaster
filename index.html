<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BACKUP DE EMERGÊNCIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .aviso { color: #ff4444; border: 2px solid #ff4444; padding: 15px; margin-bottom: 20px; }
        pre { background: #111; padding: 10px; border: 1px solid #333; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="aviso">
        <strong>MODO DE INVESTIGAÇÃO DE BACKUP</strong><br>
        Tentando localizar registros antigos no banco de dados...
    </div>
    <div id="resultado">Buscando...</div>

<script>
    const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
    const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    
    async function investigar() {
        // Tenta ler todas as linhas da tabela, não apenas a ID 1
        const { data, error } = await sb.from('racha_session').select('*');
        
        if (error) {
            document.getElementById('resultado').innerText = "Erro na busca: " + error.message;
            return;
        }

        if (data && data.length > 0) {
            let html = "<h3>Registros Encontrados:</h3>";
            data.forEach(item => {
                html += `<div><strong>ID: ${item.id}</strong> (Atualizado em: ${item.updated_at || 'Desconhecido'})</div>`;
                html += `<pre>${JSON.stringify(item.data.all, null, 2)}</pre><hr>`;
            });
            document.getElementById('resultado').innerHTML = html;
        } else {
            document.getElementById('resultado').innerText = "Nenhum dado encontrado em nenhuma tabela.";
        }
    }
    investigar();
</script>
</body>
</html>
