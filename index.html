<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESGATE AVABRA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; padding: 20px; }
        .faixa { background: #ff6b00; padding: 10px; font-weight: bold; margin-top: 20px; }
        .nome-item { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .btn-nav { background: #333; color: white; padding: 10px; margin-right: 5px; border: none; }
    </style>
</head>
<body>
    <h2>AVABRA - MODO RESGATE</h2>
    <div id="status">Conectando ao banco de dados...</div>
    
    <div style="margin-bottom: 20px;">
        <button class="btn-nav" onclick="aba('racha')">RACHA</button>
        <button class="btn-nav" onclick="aba('atletas')">LISTA COMPLETA</button>
    </div>

    <div id="aba-racha">
        <div class="faixa">NO GINÁSIO</div>
        <div id="lista-ginasio"></div>
        <div class="faixa">EM QUADRA / ESPERA</div>
        <div id="lista-jogo"></div>
    </div>

    <div id="aba-atletas" style="display:none">
        <div class="faixa">TODOS OS CADASTRADOS</div>
        <div id="lista-total"></div>
    </div>

<script>
    const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
    const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    
    let d = { all: [], white: [], blue: [], queue: [] };

    async function carregarDados() {
        const { data, error } = await sb.from('racha_session').select('data').eq('id', 1).maybeSingle();
        if (error) {
            document.getElementById('status').innerText = "Erro: " + error.message;
            return;
        }
        if (data && data.data) {
            d = data.data;
            document.getElementById('status').innerText = "Dados carregados com sucesso!";
            desenhar();
        }
    }

    function desenhar() {
        // Lista de Cadastro Total
        const listaTotal = document.getElementById('lista-total');
        if (d.all && d.all.length > 0) {
            listaTotal.innerHTML = d.all.sort().map(n => `<div class="nome-item">${n}</div>`).join('');
        } else {
            listaTotal.innerHTML = "Nenhum nome encontrado no cadastro.";
        }

        // Ginásio
        const jogo = [...(d.white||[]), ...(d.blue||[]), ...(d.queue||[])];
        const ginasio = (d.all||[]).filter(n => !jogo.includes(n));
        document.getElementById('lista-ginasio').innerHTML = ginasio.map(n => `<div class="nome-item">${n}</div>`).join('');
        
        // Em Jogo/Espera
        document.getElementById('lista-jogo').innerHTML = jogo.map(n => `<div class="nome-item">${n}</div>`).join('');
    }

    function aba(nome) {
        document.getElementById('aba-racha').style.display = nome === 'racha' ? 'block' : 'none';
        document.getElementById('aba-atletas').style.display = nome === 'atletas' ? 'block' : 'none';
    }

    carregarDados();
    setInterval(carregarDados, 5000);
</script>
</body>
</html>
