<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVABRA MASTER V21.26 - FIX SUSPENSÃO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff6b00; --blue: #2962ff; --dark: #000; --yellow: #ffd600; --red: #ff4444; --green: #25d366; }
        body { font-family: Arial, sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; user-select: none; }
        .header { display: flex; justify-content: center; align-items: center; padding: 15px; background: #000; border-bottom: 1px solid #222; }
        .logo { color: var(--orange); font-weight: bold; font-style: italic; font-size: 18px; text-transform: uppercase; }
        .placar-live { display: flex; justify-content: center; align-items: center; gap: 20px; background: #111; padding: 15px; border-bottom: 2px solid #222; }
        .placar-box { text-align: center; min-width: 80px; }
        .placar-numero { font-size: 36px; font-weight: bold; font-family: monospace; padding: 5px 15px; border-radius: 8px; border: 2px solid #333; }
        .placar-numero.br { background: #fff; color: #000; }
        .placar-numero.az { background: var(--blue); color: #fff; }
        .game-clock-area { background: #000; padding: 10px; text-align: center; border-bottom: 2px solid #222; }
        #game-clock { font-family: monospace; font-size: 52px; font-weight: bold; color: var(--yellow); }
        .area-start-match { padding: 15px; display: flex; justify-content: center; background: #111; }
        .btn-big-start { width: 100%; background: var(--green); color: #000; padding: 22px; border: none; border-radius: 8px; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .clock-controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-clock { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .timer-area { display: flex; gap: 5px; padding: 10px; background: #111; }
        .btn-t { flex: 1; padding: 14px 5px; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .vitoria-btns { display: flex; gap: 5px; padding: 10px; }
        .btn-v { flex: 1; padding: 15px; border: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .faixa { background: #111; color: #888; padding: 6px 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .linha { display: flex; flex-direction: column; padding: 10px; border-bottom: 1px solid #eee; background: #fff; color: #000; }
        .linha.azul { background: var(--blue); color: #fff; }
        .top-row { display: flex; align-items: center; }
        .info { flex: 1; } .nome { font-weight: bold; font-size: 14px; }
        .stats-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
        .acoes { display: flex; gap: 4px; }
        .f-box { background: #8b0000; color: #fff; padding: 10px 14px; border-radius: 4px; font-weight: bold; }
        .btn-p { width: 42px; height: 44px; border: none; border-radius: 4px; font-weight: bold; background: #222; color: #fff; font-size: 16px; }
        .btn-corrige { font-size: 11px; color: #d32f2f; background: #fff; border: 2px solid #d32f2f; padding: 4px 6px; border-radius: 4px; font-weight: bold; }
        .bottom-row { display: flex; gap: 5px; margin-top: 8px; }
        .btn-excluir { flex: 1; font-size: 9px; padding: 8px; border: none; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        #q-list { padding: 15px; background: #0a0a0a; font-size: 13px; font-weight: bold; color: var(--yellow); }
        .rodape { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #333; padding: 12px 0; }
        .nav-b { flex: 1; color: #fff; font-size: 11px; font-weight: bold; text-align: center; text-transform: uppercase; }
        .nav-b.active { color: var(--orange); }
    </style>
</head>
<body>
    <div id="view-racha">
        <div class="header"><div class="logo">AVABRA V21.26</div></div>
        <div class="placar-live">
            <div class="placar-box"><div id="score-br" class="placar-numero br">0</div></div>
            <div style="font-size: 24px; font-weight: bold; color: #333;">X</div>
            <div class="placar-box"><div id="score-az" class="placar-numero az">0</div></div>
        </div>
        <div class="game-clock-area">
            <div id="game-clock">10:00</div>
            <div id="init-action-area" class="area-start-match">
                <button class="btn-big-start" onclick="iniciarTudo()">🏀 INICIAR A PARTIDA</button>
            </div>
            <div id="clock-controls-area" class="clock-controls" style="display:none;">
                <button id="btn-toggle-clock" class="btn-clock" style="background:var(--orange); color:#fff;" onclick="toggleClock()">⏸️ Pausar</button>
                <button class="btn-clock" style="background:#333; color:#888;" onclick="resetClock()">🔄 Zerar</button>
            </div>
        </div>
        <div class="timer-area">
            <button class="btn-t" style="background:#fff; color:#000;" onclick="vitoriaTempo('B')">Tempo BR</button>
            <button class="btn-t" style="background:var(--blue); color:#fff;" onclick="vitoriaTempo('A')">Tempo AZ</button>
            <button class="btn-t" style="background:#555; color:#fff;" onclick="vitoriaTempo('E')">Tempo Empate</button>
        </div>
        <div class="vitoria-btns">
            <button class="btn-v" style="background:#fff; color:#000;" onclick="vitoriaPlacar('B')">Vitória BR</button>
            <button class="btn-v" style="background:var(--blue); color:#fff;" onclick="vitoriaPlacar('A')">Vitória AZ</button>
        </div>
        <div class="faixa">Branco</div><div id="w-list"></div>
        <div class="faixa">Azul</div><div id="a-list"></div>
        <div class="faixa">Fila de Espera</div><div id="q-list"></div>
        <div class="faixa">Ginásio</div><div id="disp-list"></div>
    </div>
    <div id="view-stats" style="display:none; padding:15px;"><div id="lista-estatisticas-geral"></div><hr><div id="lista-historico-partidas"></div></div>
    <div id="view-atletas" style="display:none; padding:20px;"><button style="background:var(--orange); color:white; padding:15px; border:none; width:100%; border-radius:8px; font-weight:bold;" onclick="cadastrarNovo()">+ CADASTRAR NOVO</button><div id="lista-cadastrados"></div><button style="background:var(--red); color:#fff; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; margin-top:10px;" onclick="resetarRacha()">⚠️ ZERAR TODO O RACHA</button></div>
    <div style="height:120px"></div>
    <div class="rodape"><div id="nav-racha" class="nav-b active" onclick="mudarAba('racha')">Racha</div><div id="nav-stats" class="nav-b" onclick="mudarAba('stats')">Súmulas</div><div id="nav-atletas" class="nav-b" onclick="mudarAba('atletas')">Cadastro</div></div>

<script>
    const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
    const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let d = { white: [], blue: [], queue: [], all: [], points: {}, fouls: {}, hist_pts: {}, history_matches: [], scoreW: 0, scoreA: 0, streakW: 0, streakA: 0, remaining_seconds: 600, clock_running: false, is_recording: false, suspended: [] };
    let abaAtiva = 'racha';

    async function load() {
        const { data } = await sb.from('racha_session').select('data').eq('id', 1).maybeSingle();
        if (data && data.data) {
            const localClock = d.clock_running; const localRem = d.remaining_seconds;
            const localRec = d.is_recording;
            d = data.data;
            d.clock_running = localClock; d.remaining_seconds = localRem; d.is_recording = localRec;
        }
        render();
    }
    setInterval(() => { if (abaAtiva !== 'atletas') load(); }, 10000);
    async function sync() { render(); await sb.from('racha_session').update({ data: d }).eq('id', 1); }

    function formatTimeDisplay(s) { const v = Math.max(0, s); return `${Math.floor(v/60).toString().padStart(2,'0')}:${(v%60).toString().padStart(2,'0')}`; }
    
    function iniciarTudo() { 
        d.is_recording = true; d.clock_running = true; d.remaining_seconds = 600; 
        sync(); 
    }

    function toggleClock() { d.clock_running = !d.clock_running; render(); }
    
    function resetClock() { 
        if(confirm("Zerar?")) { 
            d.clock_running = false; d.remaining_seconds = 600; d.scoreW = 0; d.scoreA = 0; d.is_recording = false; 
            sync(); 
        } 
    }

    setInterval(() => { if (d.clock_running && d.remaining_seconds > 0) { d.remaining_seconds--; document.getElementById('game-clock').innerText = formatTimeDisplay(d.remaining_seconds); } }, 1000);

    function rodarTimes() {
        while(d.white.length < 5 && d.queue.length > 0) d.white.push(d.queue.shift());
        while(d.blue.length < 5 && d.queue.length > 0) d.blue.push(d.queue.shift());
        d.scoreW = 0; d.scoreA = 0; d.points = {}; d.fouls = {}; d.is_recording = false; d.clock_running = false; d.remaining_seconds = 600;
        sync();
    }

    window.vitoriaPlacar = (v) => {
        if(!confirm("Confirmar vitória?")) return;
        const winnersSlug = v === 'B' ? 'white' : 'blue';
        const losersSlug = v === 'B' ? 'blue' : 'white';

        // REGRA DE SUSPENSÃO FIX: Filtra para devolver APENAS quem pertence ao time vencedor
        if(d.suspended && d.suspended.length > 0) {
            let aindaSuspensos = [];
            d.suspended.forEach(p => {
                if(p.team === winnersSlug) {
                    // O suspenso era do time que ganhou. Volta pro time dele.
                    if(!d[winnersSlug].includes(p.name)) d[winnersSlug].push(p.name);
                    // Remove da fila de espera o nome dele
                    d.queue = d.queue.filter(q => q !== p.name);
                } else {
                    // O suspenso era do time que perdeu. Vai pro fim da fila.
                    d.queue = d.queue.filter(q => q !== p.name);
                    d.queue.push(p.name);
                }
            });
            d.suspended = [];
        }

        if(v === 'B') {
            d.streakW++; d.streakA = 0;
            if(d.streakW >= 2) { d.queue.push(...d.white, ...d.blue); d.white = []; d.blue = []; d.streakW = 0; }
            else { d.queue.push(...d.blue); d.blue = []; }
        } else {
            d.streakA++; d.streakW = 0;
            if(d.streakA >= 2) { d.queue.push(...d.blue, ...d.white); d.white = []; d.blue = []; d.streakA = 0; }
            else { d.queue.push(...d.white); d.white = []; }
        }
        rodarTimes();
    };

    window.vitoriaTempo = (v) => {
        if(!confirm("Encerrar?")) return;
        const winnersSlug = v === 'B' ? 'white' : 'blue';
        const losersSlug = v === 'B' ? 'blue' : 'white';
        
        // No tempo, todos saem. Limpa a lista de suspensos e joga pro fim da fila conforme regra.
        let todosEmQuadra = [...d.white, ...d.blue];
        if(d.suspended) todosEmQuadra.push(...d.suspended.map(s => s.name));

        if (v === 'E') {
            const original = d.all.filter(p => todosEmQuadra.includes(p));
            d.queue.push(...original);
        } else {
            // Vencedores (incluindo suspensos do time) na frente
            const vips = [...d[winnersSlug]];
            if(d.suspended) vips.push(...d.suspended.filter(s => s.team === winnersSlug).map(s => s.name));
            
            const lobs = [...d[losersSlug]];
            if(d.suspended) lobs.push(...d.suspended.filter(s => s.team === losersSlug).map(s => s.name));
            
            d.queue.push(...vips, ...lobs);
        }
        
        d.white = []; d.blue = []; d.suspended = []; d.streakW = 0; d.streakA = 0;
        rodarTimes();
    };

    window.addPt = (n, p) => { 
        d.points[n] = (d.points[n]||0)+p; d.hist_pts[n] = (d.hist_pts[n]||0)+p; 
        if(d.white.includes(n)) d.scoreW += p; else d.scoreA += p; sync(); 
    };

    window.subPt = (n) => { 
        if((d.points[n]||0)>0){ 
            d.points[n]--; d.hist_pts[n]--; 
            if(d.white.includes(n)) d.scoreW--; else d.scoreA--; sync(); 
        } 
    };

    window.addFl = (n) => { d.fouls[n] = (d.fouls[n]||0)+1; sync(); };
    window.subFl = (n) => { if((d.fouls[n]||0)>0){ d.fouls[n]--; sync(); } };

    window.removerAtleta = (nome, local, motivo) => {
        if(!confirm("Remover atleta?")) return;
        if(motivo === 'falta') {
            d[local] = d[local].filter(p => p !== nome);
            if(!d.suspended) d.suspended = [];
            d.suspended.push({ name: nome, team: local }); // Registra o time original
            d.queue = d.queue.filter(q => q !== nome);
            d.queue.unshift(nome); // Vai para o topo da fila
        } else {
            d[local] = d[local].filter(p => p !== nome);
            if(d.queue.length > 0) {
                const reserva = (d.scoreW===0 && d.scoreA===0) ? d.queue.shift() : d.queue.pop();
                d[local].push(reserva);
            }
        }
        sync();
    };

    window.cadastrarNovo = () => { const n = prompt("NOME:"); if(n){ d.all.push(n.toUpperCase().trim()); sync(); } };
    window.entrarNoJogo = (n) => { if(d.white.length < 5) d.white.push(n); else if(d.blue.length < 5) d.blue.push(n); else d.queue.push(n); sync(); };
    window.mudarAba = (aba) => { abaAtiva = aba; document.querySelectorAll('[id^="view-"]').forEach(v => v.style.display = 'none'); document.getElementById(`view-${aba}`).style.display = 'block'; document.querySelectorAll('.nav-b').forEach(el => el.classList.remove('active')); document.getElementById(`nav-${aba}`).classList.add('active'); };
    window.resetarRacha = () => { if(confirm("ZERAR TUDO?")) { d = { white: [], blue: [], queue: [], all: d.all, points: {}, fouls: {}, hist_pts: {}, history_matches: [], scoreW: 0, scoreA: 0, streakW: 0, streakA: 0, remaining_seconds: 600, clock_running: false, is_recording: false, suspended: [] }; sync(); } };

    function render() {
        document.getElementById('score-br').innerText = d.scoreW;
        document.getElementById('score-az').innerText = d.scoreA;
        document.getElementById('game-clock').innerText = formatTimeDisplay(d.remaining_seconds);
        
        const areaStart = document.getElementById('init-action-area');
        const areaClock = document.getElementById('clock-controls-area');
        if (d.is_recording) { areaStart.style.display = 'none'; areaClock.style.display = 'flex'; } 
        else { areaStart.style.display = 'flex'; areaClock.style.display = 'none'; }

        const draw = (list, id, az, slug) => {
            document.getElementById(id).innerHTML = list.map(p => `<div class="linha ${az?'azul':''}">
                <div class="top-row"><div class="info"><span class="nome">${p}</span><div class="stats-row"><span>P: ${d.points[p]||0} | F: ${d.fouls[p]||0}</span><button class="btn-corrige" onclick="subPt('${p}')">P-</button><button class="btn-corrige" onclick="subFl('${p}')">F-</button></div></div>
                <div class="acoes"><div class="f-box" onclick="addFl('${p}')">F+</div><div><button class="btn-p" onclick="addPt('${p}',1)">1</button><button class="btn-p" onclick="addPt('${p}',2)">2</button><button class="btn-p" style="background:var(--orange)" onclick="addPt('${p}',3)">3</button></div></div></div>
                <div class="bottom-row"><button class="btn-excluir" style="background:#555;color:#fff;" onclick="removerAtleta('${p}','${slug}','sub')">Sair</button><button class="btn-excluir" style="background:var(--red);color:#fff;" onclick="removerAtleta('${p}','${slug}','falta')">Faltas</button></div></div>`).join('');
        };
        draw(d.white, 'w-list', false, 'white'); draw(d.blue, 'a-list', true, 'blue');
        
        document.getElementById('q-list').innerHTML = d.queue.map((p, i) => {
            const isS = d.suspended && d.suspended.find(s => s.name === p);
            return `<span style="margin-right:10px; color:${isS?'red':'inherit'}">${i+1}.${p}${isS?'[S]':''}</span>`;
        }).join(' ');
        
        document.getElementById('disp-list').innerHTML = d.all.filter(p => ![...d.white, ...d.blue, ...d.queue].includes(p)).sort().map(p => `<div style="display:flex; justify-content:space-between; padding:10px; background:#1a1a1a; border-bottom:1px solid #222;"><span>${p}</span><button onclick="entrarNoJogo('${p}')">CHEGOU</button></div>`).join('');
        document.getElementById('lista-cadastrados').innerHTML = d.all.sort().map(p => `<div style="display:flex; justify-content:space-between; padding:10px; background:#1a1a1a; border-bottom:1px solid #222;"><span>${p}</span><button style="color:red; background:none; border:none;" onclick="if(confirm('Excluir?')){d.all=d.all.filter(x=>x!==p);sync()}">EXCLUIR</button></div>`).join('');
        let hS = ""; d.all.sort().forEach(p => { if((d.hist_pts[p]||0)>0) hS += `<div style="padding:10px; display:flex; justify-content:space-between; background:#1a1a1a; margin-bottom:2px;"><span>${p}</span><span>${d.hist_pts[p]} PTS</span></div>`; });
        document.getElementById('lista-estatisticas-geral').innerHTML = hS || "Vazio.";
    }
    load();
</script>
</body>
</html>
