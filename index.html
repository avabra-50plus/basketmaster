<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BASKETMASTER AVABRA V7.6.0 - RECUPERADA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #ff6b00; --dark: #1a1a1a; --white: #ffffff; --blue: #0047ab; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 10px; text-align: center; }
        .header { background: linear-gradient(145deg, #222, #000); padding: 15px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 15px; }
        h1 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; }
        
        .teams-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .team-card { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #444; min-height: 200px; }
        .team-white { background: #f0f0f0; color: #000; }
        .team-blue { background: var(--blue); color: #fff; border-color: #002d6b; }
        
        .player-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.1); margin: 5px 0; padding: 8px; border-radius: 8px; font-weight: bold; }
        .foul-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .points-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-add { background: #4caf50; color: white; }
        .btn-win { background: var(--primary); color: white; }
        .btn-reset { background: #666; color: white; grid-column: span 2; margin-top: 10px; }
        
        #queue-list { background: #333; padding: 10px; border-radius: 10px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="header">
        <h1>AVABRA MASTER 50</h1>
    </div>

    <div class="teams-container">
        <div class="team-card team-white">
            <h3>BRANCO</h3>
            <div id="list-white"></div>
        </div>
        <div class="team-card team-blue">
            <h3>AZUL</h3>
            <div id="list-blue"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-add" onclick="addPlayer()">+ NOVO ATLETA</button>
        <button class="btn-win" onclick="winGame()">VITORIA/PROXIMO</button>
        <button class="btn-reset" onclick="resetSystem()">ZERAR TUDO</button>
    </div>

    <div id="queue-list">
        <strong>PRÓXIMOS DA FILA:</strong>
        <div id="list-queue"></div>
    </div>

    <script>
        const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
        const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let state = { white: [], blue: [], queue: [], points: {}, fouls: {} };

        async function loadData() {
            const { data } = await supabaseClient.from('racha_session').select('data').eq('id', 1).single();
            if (data) {
                state = data.data;
                render();
            }
        }

        async function sync() {
            await supabaseClient.from('racha_session').update({ data: state }).eq('id', 1);
            render();
        }

        function addPlayer() {
            const name = prompt("Nome do Atleta:").toUpperCase();
            if (!name) return;
            state.points[name] = 0;
            state.fouls[name] = 0;
            if (state.white.length < 5) state.white.push(name);
            else if (state.blue.length < 5) state.blue.push(name);
            else state.queue.push(name);
            sync();
        }

        function addFoul(name) {
            state.fouls[name] = (state.fouls[name] || 0) + 1;
            if (state.fouls[name] >= 4) alert("🚨 " + name + " ESTOUROU!");
            sync();
        }

        function winGame() {
            const winner = prompt("Quem venceu? (B para Branco / A para Azul)").toUpperCase();
            if (winner === 'B') rotate(state.blue);
            else if (winner === 'A') rotate(state.white);
        }

        function rotate(losingTeam) {
            state.queue.push(...losingTeam);
            losingTeam.length = 0;
            while (losingTeam.length < 5 && state.queue.length > 0) {
                losingTeam.push(state.queue.shift());
            }
            Object.keys(state.fouls).forEach(p => state.fouls[p] = 0);
            sync();
        }

        function resetSystem() {
            if (confirm("Zerar racha?")) {
                state = { white: [], blue: [], queue: [], points: {}, fouls: {} };
                sync();
            }
        }

        function render() {
            const draw = (list, elementId) => {
                document.getElementById(elementId).innerHTML = list.map(p => `
                    <div class="player-item">
                        ${p} 
                        <div>
                            <span class="points-badge">F: ${state.fouls[p] || 0}</span>
                            <button class="foul-btn" onclick="addFoul('${p}')">F</button>
                        </div>
                    </div>
                `).join('');
            };
            draw(state.white, 'list-white');
            draw(state.blue, 'list-blue');
            document.getElementById('list-queue').innerText = state.queue.join(', ');
        }

        loadData();
    </script>
</body>
</html>
