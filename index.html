<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BASKETMASTER AVABRA V9.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff6b00; --blue: #2962ff; --dark: #000; }
        body { font-family: Arial, sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; user-select: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #000; border-bottom: 1px solid #222; }
        .logo { color: var(--orange); font-weight: bold; font-style: italic; font-size: 18px; text-transform: uppercase; }
        
        .vitoria-btns { display: flex; gap: 5px; padding: 10px; }
        .btn-v { flex: 1; padding: 15px; border: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 13px; cursor: pointer; }
        .btn-white { background: #fff; color: #000; }
        .btn-blue { background: var(--blue); color: #fff; }

        .faixa { background: #111; color: #888; padding: 6px 15px; font-size: 10px; text-transform: uppercase; font-weight: bold; text-align: left; border-bottom: 1px solid #222; }

        .linha { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #eee; background: #fff; color: #000; }
        .linha.azul { background: var(--blue); color: #fff; border-bottom: 1px solid #1a4bc2; }
        .info { flex: 1; text-align: left; }
        .nome { font-weight: bold; font-size: 14px; display: block; }
        .stats { font-size: 12px; font-weight: bold; }
        .stats b { color: #ff0000; }
        .azul .stats b { color: #ffeb3b; }

        .acoes { display: flex; gap: 4px; align-items: center; }
        .f-box { background: #8b0000; color: #fff; padding: 4px 8px; border-radius: 4px; text-align: center; cursor: pointer; }
        .f-box b { display: block; font-size: 12px; }
        .f-box s { font-size: 8px; text-decoration: none; opacity: 0.7; }

        .g-pts { display: flex; gap: 2px; }
        .btn-p { width: 36px; height: 38px; border: none; border-radius: 4px; font-weight: bold; background: #222; color: #fff; font-size: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-p i { font-size: 7px; color: #666; font-style: normal; font-weight: normal; }
        .btn-p.laranja { background: var(--orange); }
        .btn-sub { font-size: 10px; color: #ff4444; background: transparent; border: 1px solid #ccc; padding: 2px 5px; border-radius: 3px; margin-top: 2px; font-weight: bold; }
        .azul .btn-sub { border-color: rgba(255,255,255,0.3); color: #fff; }

        .lista-disp { background: #1a1a1a; padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn-entrar { background: #2e7d32; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; font-size: 12px; cursor: pointer; }

        #view-atletas { display: none; padding: 20px; }
        #btn-add-global { background: var(--orange); color: white; padding: 15px; border: none; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; }
        
        .rodape { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #222; padding: 15px 0; z-index: 100; }
        .nav-b { flex: 1; color: #444; font-size: 11px; font-weight: bold; text-align: center; cursor: pointer; }
        .nav-b.active { color: var(--orange); }
    </style>
</head>
<body>

    <div id="view-racha">
        <div class="header">
            <div class="logo">BASKETMASTER 50+</div>
            <button style="background:#333;color:#fff;border:none;padding:5px 10px;border-radius:4px;" onclick="resetarRacha()">LIMPAR JOGO</button>
        </div>

        <div class="vitoria-btns">
            <button class="btn-v btn-white" onclick="vitoria('B')">VITORIA BRANCO</button>
            <button class="btn-v btn-blue" onclick="vitoria('A')">VITORIA AZUL</button>
        </div>

        <div class="faixa">Time Branco (Em Quadra)</div>
        <div id="w-list"></div>

        <div class="faixa">Time Azul (Em Quadra)</div>
        <div id="a-list"></div>

        <div class="faixa">Lista de Espera (Fila)</div>
        <div id="q-list" style="padding: 12px; color: var(--orange); font-weight: bold; font-size: 14px; background: #0a0a0a;">Vazio</div>

        <div class="faixa">Atletas no Ginásio (Clique para entrar no Racha)</div>
        <div id="disp-list"></div>
    </div>

    <div id="view-atletas">
        <div class="logo" style="margin-bottom: 20px; text-align: center;">BANCO DE DADOS 50+</div>
        <button id="btn-add-global" onclick="cadastrarNovo()">+ CADASTRAR NOVO NOME</button>
        <div class="faixa" style="background:transparent; padding:0; margin-bottom:10px;">Nomes Cadastrados:</div>
        <div id="lista-cadastrados"></div>
    </div>

    <div style="height:100px"></div>

    <div class="rodape">
        <div id="nav-racha" class="nav-b active" onclick="mudarAba('racha')">RACHA (JOGO)</div>
        <div id="nav-atletas" class="nav-b" onclick="mudarAba('atletas')">ATLETAS (CADASTRO)</div>
    </div>

    <script>
        const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
        const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        
        let d = { white: [], blue: [], queue: [], all: [], points: {}, fouls: {} };

        async function load() {
            const { data } = await sb.from('racha_session').select('data').eq('id', 1).maybeSingle();
            if (data && data.data) {
                d = data.data;
                if(!d.all) d.all = []; if(!d.white) d.white = []; if(!d.blue) d.blue = [];
                if(!d.queue) d.queue = []; if(!d.points) d.points = {}; if(!d.fouls) d.fouls = {};
            }
            render();
        }

        async function sync() {
            render();
            await sb.from('racha_session').update({ data: d }).eq('id', 1);
        }

        window.mudarAba = (aba) => {
            document.getElementById('view-racha').style.display = aba === 'racha' ? 'block' : 'none';
            document.getElementById('view-atletas').style.display = aba === 'atletas' ? 'block' : 'none';
            document.getElementById('nav-racha').classList.toggle('active', aba === 'racha');
            document.getElementById('nav-atletas').classList.toggle('active', aba === 'atletas');
        };

        window.cadastrarNovo = () => {
            const n = prompt("NOME DO ATLETA:");
            if (!n) return;
            const nome = n.toUpperCase().trim();
            if (!d.all.includes(nome)) {
                d.all.push(nome);
                sync();
            } else { alert("Nome já cadastrado!"); }
        };

        window.entrarNoJogo = (nome) => {
            d.points[nome] = 0; d.fouls[nome] = 0;
            if (d.white.length < 5) d.white.push(nome);
            else if (d.blue.length < 5) d.blue.push(nome);
            else d.queue.push(nome);
            sync();
        };

        window.addPt = (n, p) => { d.points[n] = (d.points[n] || 0) + p; sync(); };
        window.subPt = (n) => { d.points[n] = Math.max(0, (d.points[n] || 0) - 1); sync(); };
        window.addFl = (n) => { d.fouls[n] = (d.fouls[n] || 0) + 1; if(d.fouls[n]>=4) alert(n+" ESTOUROU!"); sync(); };

        window.vitoria = (vencedor) => {
            const perdedores = (vencedor === 'B') ? d.blue : d.white;
            d.queue.push(...perdedores);
            perdedores.length = 0;
            while (perdedores.length < 5 && d.queue.length > 0) perdedores.push(d.queue.shift());
            Object.keys(d.fouls).forEach(k => d.fouls[k] = 0);
            sync();
        };

        function render() {
            const drawRow = (list, id, azul) => {
                document.getElementById(id).innerHTML = list.map(p => `
                    <div class="linha ${azul ? 'azul' : ''}">
                        <div class="info">
                            <span class="nome">${p} <b>(${d.points[p]||0})</b></span>
                            <span class="stats">F: ${d.fouls[p]||0}</span>
                            <button class="btn-sub" onclick="subPt('${p}')">PONTO -</button>
                        </div>
                        <div class="acoes">
                            <div class="f-box" onclick="addFl('${p}')"><b>F+</b><s>-F</s></div>
                            <div class="g-pts">
                                <button class="btn-p" onclick="addPt('${p}',1)">1</button>
                                <button class="btn-p" onclick="addPt('${p}',2)">2<i>ERRO</i></button>
                                <button class="btn-p laranja" onclick="addPt('${p}',3)">3</button>
                            </div>
                        </div>
                    </div>`).join('');
            };

            drawRow(d.white, 'w-list', false);
            drawRow(d.blue, 'a-list', true);
            document.getElementById('q-list').innerText = d.queue.join(' - ') || 'Ninguém na fila';

            // LISTA DE DISPONÍVEIS (Nomes cadastrados que ainda não clicaram em Entrar)
            const jogando = [...d.white, ...d.blue, ...d.queue];
            const disponiveis = d.all.filter(p => !jogando.includes(p)).sort();
            document.getElementById('disp-list').innerHTML = disponiveis.map(p => `
                <div class="lista-disp">
                    <span>${p}</span>
                    <button class="btn-entrar" onclick="entrarNoJogo('${p}')">CHEGOU</button>
                </div>
            `).join('');

            // LISTA GERAL NA ABA ATLETAS
            document.getElementById('lista-cadastrados').innerHTML = d.all.sort().map(p => `
                <div style="padding:10px; border-bottom:1px solid #333; color:#aaa;">${p}</div>
            `).join('');
        }

        window.resetarRacha = () => { 
            if(confirm("LIMPAR JOGO? (Os nomes cadastrados continuam no banco)")) { 
                d.white=[]; d.blue=[]; d.queue=[]; d.points={}; d.fouls={}; sync(); 
            } 
        };

        load();
    </script>
</body>
</html>
