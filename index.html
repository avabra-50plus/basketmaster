<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BASKETMASTER AVABRA V7.6.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #ff6b00; --dark: #1a1a1a; --white: #ffffff; --blue: #0047ab; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 10px; text-align: center; }
        .header { background: linear-gradient(145deg, #222, #000); padding: 15px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 15px; }
        h1 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; }
        .cloud-status { font-size: 10px; color: #4caf50; margin-top: 5px; }
        
        .teams-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .team-card { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #444; min-height: 150px; }
        .team-white { background: #f0f0f0; color: #000; }
        .team-blue { background: var(--blue); color: #fff; border-color: #002d6b; }
        
        .player-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.1); margin: 5px 0; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .foul-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-left: 5px; }
        .points-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-add { background: #4caf50; color: white; }
        .btn-win { background: var(--primary); color: white; }
        .btn-reset { background: #666; color: white; grid-column: span 2; margin-top: 10px; }
        
        #queue-list { background: #333; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>AVABRA MASTER 50</h1>
        <div id="status" class="cloud-status">● CONECTADO À NUVEM (V7.6.1)</div>
    </div>

    <div class="teams-container">
        <div class="team-card team-white">
            <h3 style="margin-top:0">BRANCO</h3>
            <div id="list-white"></div>
        </div>
        <div class="team-card team-blue">
            <h3 style="margin-top:0">AZUL</h3>
            <div id="list-blue"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-add" onclick="addPlayer()">+ NOVO ATLETA</button>
        <button class="btn-win" onclick="winGame()">VITÓRIA / PRÓXIMO</button>
        <button class="btn-reset" onclick="resetSystem()">ZERAR TUDO</button>
    </div>

    <div id="queue-list">
        <strong>PRÓXIMOS DA FILA:</strong>
        <div id="list-queue" style="margin-top: 10px; color: #ffab00; font-weight: bold;"></div>
    </div>

    <script>
        const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
        const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let state = { white: [], blue: [], queue: [], points: {}, fouls: {} };

        // 1. Carregar dados da Nuvem
        async function loadData() {
            const { data, error } = await supabaseClient.from('racha_session').select('data').eq('id', 1).single();
            if (data) {
                state = data.data;
                render();
            }
            // Tenta recuperar nomes antigos do aparelho após carregar a nuvem
            migrarDadosAntigos();
        }

        // 2. Tentar resgatar nomes da versão offline
        async function migrarDadosAntigos() {
            const salvoAntigo = localStorage.getItem('racha_avabra_data'); // Nome da chave que usávamos antes
            if (salvoAntigo) {
                const dadosRecuperados = JSON.parse(salvoAntigo);
                // Se a nuvem estiver vazia mas o celular tiver nomes, pergunta se quer subir
                if (state.white.length === 0 && (dadosRecuperados.white.length > 0 || dadosRecuperados.queue.length > 0)) {
                    if (confirm("Encontrei nomes salvos neste celular da versão anterior. Deseja recuperá-los para a nuvem?")) {
                        state = dadosRecuperados;
                        sync();
                        localStorage.removeItem('racha_avabra_data'); // Limpa para não perguntar mais
                        alert("Nomes recuperados!");
                    }
                }
            }
        }

        // 3. Sincronizar com a Nuvem
        async function sync() {
            await supabaseClient.from('racha_session').update({ data: state }).eq('id', 1);
            render();
        }

        function addPlayer() {
            const name = prompt("Nome do Atleta:").toUpperCase();
            if (!name) return;
            if (!state.points[name]) state.points[name] = 0;
            if (!state.fouls[name]) state.fouls[name] = 0;
            
            if (state.white.length < 5) state.white.push(name);
            else if (state.blue.length < 5) state.blue.push(name);
            else state.queue.push(name);
            sync();
        }

        function addFoul(name) {
            state.fouls[name] = (state.fouls[name] || 0) + 1;
            if (state.fouls[name] >= 4) alert("🚨 " + name + " ESTOUROU EM FALTAS!");
            sync();
        }

        function winGame() {
            const winner = prompt("Quem venceu? (B para Branco / A para Azul)").toUpperCase();
            if (winner === 'B') rotate(state.blue);
            else if (winner === 'A') rotate(state.white);
        }

        function rotate(losingTeam) {
            state.queue.push(...losingTeam);
            losingTeam.length = 0;
            while (losingTeam.length < 5 && state.queue.length > 0) {
                losingTeam.push(state.queue.shift());
            }
            // Zera faltas para a próxima partida
            Object.keys(state.fouls).forEach(p => state.fouls[p] = 0);
            sync();
        }

        function resetSystem() {
            if (confirm("Deseja zerar todo o racha da nuvem?")) {
                state = { white: [], blue: [], queue: [], points: {}, fouls: {} };
                sync();
            }
        }

        function render() {
            const draw = (list, elementId) => {
                const el = document.getElementById(elementId);
                el.innerHTML = list.map(p => `
                    <div class="player-item">
                        <span>${p}</span>
                        <div>
                            <span class="points-badge">${state.fouls[p] || 0}F</span>
                            <button class="foul-btn" onclick="addFoul('${p}')">F</button>
                        </div>
                    </div>
                `).join('');
            };
            draw(state.white, 'list-white');
            draw(state.blue, 'list-blue');
            document.getElementById('list-queue').innerText = state.queue.join(' → ') || 'Vazio';
        }

        // Escutar mudanças em tempo real de outros aparelhos
        supabaseClient.channel('any').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'racha_session' }, payload => {
            state = payload.new.data;
            render();
        }).subscribe();

        loadData();
    </script>
</body>
</html>
