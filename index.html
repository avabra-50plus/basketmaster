<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BASKETMASTER AVABRA V7.7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #ff6b00; --blue: #2962ff; }
        body { font-family: Arial, Helvetica, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .logo { color: var(--orange); font-weight: bold; font-style: italic; font-size: 18px; text-transform: uppercase; }
        .stats-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 5px 12px; border-radius: 4px; font-size: 11px; }
        .top-btns { display: flex; gap: 5px; padding: 10px; }
        .btn-v { flex: 1; padding: 15px; border: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 13px; cursor: pointer; }
        .btn-white { background: #fff; color: #000; }
        .btn-blue { background: var(--blue); color: #fff; }
        .sub-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 0 10px 10px; }
        .btn-s { background: #1a1a1a; color: #888; border: none; padding: 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .section-title { background: #0a0a0a; color: #444; padding: 5px 15px; font-size: 10px; text-transform: uppercase; text-align: left; }
        .row { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #eee; background: #fff; color: #000; }
        .row.blue-row { background: var(--blue); color: #fff; border-bottom: 1px solid #1a4bc2; }
        .p-info { flex: 1; text-align: left; }
        .p-name { font-weight: bold; font-size: 13px; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 100px; }
        .p-stats { font-size: 12px; font-weight: bold; }
        .p-stats b { color: #ff0000; }
        .blue-row .p-stats b { color: #ffeb3b; }
        .p-actions { display: flex; gap: 4px; align-items: center; }
        .btn-icon { background: #efefef; border: 1px solid #ccc; padding: 6px; border-radius: 4px; font-size: 14px; }
        .blue-row .btn-icon { background: rgba(255,255,255,0.2); border: none; color: #fff; }
        .foul-trigger { background: #8b0000; color: #fff; padding: 4px 8px; border-radius: 4px; text-align: center; min-width: 32px; }
        .foul-trigger b { display: block; font-size: 12px; }
        .foul-trigger small { font-size: 8px; opacity: 0.7; }
        .pt-group { display: flex; gap: 2px; }
        .btn-pt { width: 34px; height: 34px; border: none; border-radius: 4px; font-weight: bold; background: #222; color: #fff; font-size: 14px; }
        .btn-pt small { display: block; font-size: 7px; color: #666; font-weight: normal; margin-top: -2px; }
        .btn-pt.orange { background: var(--orange); }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #222; padding: 12px 0; z-index: 999; }
        .nav-btn { flex: 1; color: #444; font-size: 11px; font-weight: bold; text-align: center; }
        .nav-btn.active { color: var(--orange); }
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:black; color:white; display:flex; align-items:center; justify-content:center; z-index:9999; font-size:12px; text-transform:uppercase; letter-spacing:2px; }
    </style>
</head>
<body>

    <div id="loading-screen">Carregando Nuvem...</div>

    <div class="header">
        <div class="logo">BASKETMASTER <span style="font-size:10px; background:#222; color:#fff; padding:1px 4px; border-radius:3px;">50+</span></div>
        <button class="stats-btn" onclick="confirmReset()">STATS</button>
    </div>

    <div class="top-btns">
        <button class="btn-v btn-white" onclick="handleWin('B')">VITORIA BRANCO</button>
        <button class="btn-v btn-blue" onclick="handleWin('A')">VITORIA AZUL</button>
    </div>

    <div class="sub-menu">
        <button class="btn-s">T (BR+)</button>
        <button class="btn-s">T (AZ+)</button>
        <button class="btn-s" onclick="handleAddNew()">+ ATLETA</button>
    </div>

    <div class="section-title">Time Branco</div>
    <div id="white-container"></div>

    <div class="section-title">Time Azul</div>
    <div id="blue-container"></div>

    <div style="height:80px"></div>

    <div class="nav">
        <div class="nav-btn active">RACHA</div>
        <div class="nav-btn" id="queue-label">ATLETAS (0)</div>
    </div>

    <script>
        // CONFIGURAÇÕES
        const SB_URL = "https://zjkiujzoualdumzmwmgl.supabase.co";
        const SB_KEY = "sb_publishable_9CbfmCbckgBJvXd7bUIMcg_mXbY_ALO";
        
        let supabase;
        let appState = { white: [], blue: [], queue: [], points: {}, fouls: {} };

        // INICIALIZAÇÃO SEGURA
        window.onload = async () => {
            try {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                await fetchData();
                document.getElementById('loading-screen').style.display = 'none';
            } catch (err) {
                document.getElementById('loading-screen').innerText = "Erro de Conexão";
            }
        };

        async function fetchData() {
            const { data, error } = await supabase.from('racha_session').select('data').eq('id', 1).single();
            if (data && data.data) {
                appState = data.data;
            }
            render();
        }

        async function updateCloud() {
            render(); // Atualiza visual na hora
            await supabase.from('racha_session').update({ data: appState }).eq('id', 1);
        }

        // FUNÇÕES DE BOTÃO
        window.handleAddNew = function() {
            const name = prompt("Nome do Jogador:");
            if (!name) return;
            const upperName = name.toUpperCase().trim();
            
            if (!appState.points) appState.points = {};
            if (!appState.fouls) appState.fouls = {};
            
            appState.points[upperName] = 0;
            appState.fouls[upperName] = 0;

            if (appState.white.length < 5) appState.white.push(upperName);
            else if (appState.blue.length < 5) appState.blue.push(upperName);
            else appState.queue.push(upperName);
            
            updateCloud();
        };

        window.addPt = function(pName, value) {
            appState.points[pName] = (appState.points[pName] || 0) + value;
            updateCloud();
        };

        window.addFl = function(pName) {
            appState.fouls[pName] = (appState.fouls[pName] || 0) + 1;
            if (appState.fouls[pName] >= 4) alert("🚨 " + pName + " ESTOUROU!");
            updateCloud();
        };

        window.handleWin = function(teamLetter) {
            const losingTeam = (teamLetter === 'B') ? appState.blue : appState.white;
            appState.queue.push(...losingTeam);
            losingTeam.length = 0;
            
            while (losingTeam.length < 5 && appState.queue.length > 0) {
                losingTeam.push(appState.queue.shift());
            }
            
            // Zerar faltas
            Object.keys(appState.fouls).forEach(k => appState.fouls[k] = 0);
            updateCloud();
        };

        window.confirmReset = function() {
            if (confirm("Deseja zerar o sistema completamente?")) {
                appState = { white: [], blue: [], queue: [], points: {}, fouls: {} };
                updateCloud();
            }
        };

        // RENDERIZAÇÃO
        function render() {
            const createList = (list, containerId, isBlue) => {
                const container = document.getElementById(containerId);
                if (!container) return;
                
                container.innerHTML = list.map(player => `
                    <div class="row ${isBlue ? 'blue-row' : ''}">
                        <div class="p-info">
                            <span class="p-name">${player} <b>(${appState.points[player] || 0})</b></span>
                            <span class="p-stats">F: ${appState.fouls[player] || 0}</span>
                        </div>
                        <div class="p-actions">
                            <button class="btn-icon">🚪</button>
                            <button class="btn-icon">🚑</button>
                            <div class="foul-trigger" onclick="addFl('${player}')"><b>F+</b><small>-F</small></div>
                            <div class="pt-group">
                                <button class="btn-pt" onclick="addPt('${player}', 1)">1</button>
                                <button class="btn-pt" onclick="addPt('${player}', 2)">2<small>ERRO</small></button>
                                <button class="btn-pt orange" onclick="addPt('${player}', 3)">3</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            };

            createList(appState.white, 'white-container', false);
            createList(appState.blue, 'blue-container', true);
            document.getElementById('queue-label').innerText = `ATLETAS (${appState.queue.length})`;
        }

        // REALTIME
        setTimeout(() => {
            supabase.channel('changes').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'racha_session' }, payload => {
                if (payload.new && payload.new.data) {
                    appState = payload.new.data;
                    render();
                }
            }).subscribe();
        }, 2000);

    </script>
</body>
</html>
